<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messaggio Casa Scout</title>
  <meta name="author" content="Br1Brown">

  <meta name="description"
    content="Generatore di messaggi per richiesta casa scout. Inserisci i dati e invia subito il messaggio pronto.">

  <!-- Open Graph (WhatsApp, Facebook, ecc.) -->
  <meta property="og:title" content="Richiesta Casa Scout">
  <meta property="og:description" content="Crea il tuo messaggio per richiedere una casa scout in pochi secondi.">
  <meta property="og:type" content="website">

  <meta name="theme-color" content="#198754">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Casa Scout">

  <!-- Favicon & PWA -->
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="manifest" href="manifest.json">

  <!-- Bootstrap 5.3 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <!-- Flatpickr (date range picker) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/it.js"></script>
  <!-- SweetAlert2 (solo per feedback copia/condividi) -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- Stili custom -->
  <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-light min-vh-100 d-flex flex-column">

  <!-- ====== HEADER ====== -->
  <header class="bg-success text-white text-center py-4 shadow-sm">
    <i class="bi bi-house-heart-fill fs-1 d-block mb-1"></i>
    <h1 class="h4 mb-0 fw-bold">Richiesta Casa Scout</h1>
    <p class="small mb-0 opacity-75">Crea il tuo messaggio in pochi secondi</p>
  </header>

  <!-- ====== INDICATORI PAGINA ====== -->
  <div class="d-flex justify-content-center gap-2 pt-3">
    <span id="dot1" class="rounded-circle bg-success" style="width:10px;height:10px;"></span>
    <span id="dot2" class="rounded-circle bg-secondary opacity-25" style="width:10px;height:10px;"></span>
  </div>

  <!-- ====== MAIN ====== -->
  <main class="container py-3 flex-grow-1" style="max-width:600px;">

    <div id="mainCarousel" class="carousel slide" data-bs-touch="false" data-bs-interval="false">
      <div class="carousel-inner overflow-hidden">

        <!-- ══════════════════════════════════════════════
             SLIDE 1 — FORM
        ══════════════════════════════════════════════ -->
        <div class="carousel-item active">
          <form id="formDati" novalidate class="pb-2">

            <!-- Nome -->
            <div class="mb-3">
              <label for="inp-nome" class="form-label fw-semibold">Il tuo nome</label>
              <input id="inp-nome" type="text" class="form-control form-control-lg" placeholder="Es. Marco"
                autocomplete="given-name" required />
              <div class="invalid-feedback">Inserisci il tuo nome</div>
            </div>

            <!-- Ruolo -->
            <div class="mb-3">
              <label for="inp-ruolo" class="form-label fw-semibold">Il tuo ruolo</label>
              <select id="inp-ruolo" class="form-select form-select-lg" required>
                <option value="" disabled selected>Scegli il ruolo…</option>
              </select>
              <div class="invalid-feedback">Scegli il tuo ruolo</div>
            </div>

            <!-- Gruppo -->
            <div class="mb-3">
              <label for="inp-gruppo" class="form-label fw-semibold">Gruppo scout</label>
              <input id="inp-gruppo" type="text" class="form-control form-control-lg" placeholder="Es. Milano 3"
                autocomplete="off" required />
              <div class="invalid-feedback">Inserisci il nome del gruppo</div>
            </div>

            <!-- Casa -->
            <div class="mb-3">
              <label for="inp-casa" class="form-label fw-semibold">Nome della casa</label>
              <input id="inp-casa" type="text" class="form-control form-control-lg" placeholder="Es. Cascina Rossa"
                autocomplete="off" required />
              <div class="invalid-feedback">Inserisci il nome della casa</div>
            </div>

            <!-- Date -->
            <div class="mb-3">
              <label for="inp-date-range" class="form-label fw-semibold">Periodo di soggiorno</label>
              <input id="inp-date-range" type="text" class="form-control form-control-lg"
                placeholder="Seleziona dal… al…" readonly autocomplete="off" required />
              <input id="inp-data1" type="hidden" required />
              <input id="inp-data2" type="hidden" required />
              <div class="invalid-feedback" id="feedback-date-range">Seleziona un periodo</div>
            </div>

            <!-- Partecipanti (opzionale) -->
            <div class="mb-4">
              <button type="button" id="btn-toggle-partecipanti"
                class="btn btn-link text-success text-decoration-none ps-0 small fw-semibold"
                aria-expanded="false" aria-controls="collapse-partecipanti">
                <i class="bi bi-plus-circle icon-apri me-1"></i>
                <i class="bi bi-dash-circle icon-chiudi me-1"></i>
                Numero di partecipanti
              </button>
              <div class="collapse" id="collapse-partecipanti">
                <input id="inp-partecipanti" type="number" inputmode="numeric" class="form-control form-control-lg mt-1"
                  placeholder="Es. 12" min="1" max="999" autocomplete="off" />
                <div class="invalid-feedback">Inserisci un numero valido (tra 1 e 999)</div>
              </div>
            </div>

            <!-- Bottone -->
            <div class="d-grid">
              <button type="submit" class="btn btn-success btn-lg shadow-sm">
                <i class="bi bi-arrow-right-circle-fill me-2"></i>Genera messaggio
              </button>
            </div>

          </form>
        </div><!-- /carousel-item slide 1 -->

        <!-- ══════════════════════════════════════════════
             SLIDE 2 — RISULTATO
        ══════════════════════════════════════════════ -->
        <div class="carousel-item">

          <div class="alert alert-success d-flex align-items-center mb-3" role="alert">
            <i class="bi bi-check-circle-fill me-2 fs-5 flex-shrink-0"></i>
            <span>Messaggio pronto! Scegli come inviarlo</span>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold text-muted small text-uppercase">
              Il tuo messaggio
            </label>
            <textarea id="testoMessaggio" class="form-control" rows="6" readonly
              style="resize:none; background:#fff; font-size:1rem;"></textarea>
          </div>

          <div class="d-grid gap-2 mb-4">
            <button id="btnCondividi" class="btn btn-success btn-lg" onclick="condividiMessaggio()">
              <i class="bi bi-send-fill me-2"></i>Invia messaggio
            </button>
            <button class="btn btn-outline-success btn-lg" onclick="copiaMessaggio()">
              <i class="bi bi-clipboard me-2"></i>Copia testo
            </button>
          </div>

          <hr />

          <div class="d-grid">
            <button class="btn btn-outline-secondary" onclick="torna()">
              <i class="bi bi-pencil me-2"></i>Modifica dati
            </button>
          </div>

        </div><!-- /carousel-item slide 2 -->

      </div><!-- /carousel-inner -->
    </div><!-- /carousel -->

  </main>

  <!-- ====== FOOTER ====== -->
  <footer class="text-center py-3 text-muted small">
    Strumento per capi scout &mdash; <i class="bi bi-heart-fill text-danger"></i> Br1Brown
  </footer>

  <!-- Bootstrap JS bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Script custom -->
  <script src="script.js"></script>

  <!-- Registra Service Worker -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>

</body>

</html>
